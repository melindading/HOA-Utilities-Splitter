<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOA Utility Bill Splitter</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Lucide React icons as inline SVGs
    const Upload = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
    );

    const AlertCircle = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    );

    const Mail = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
        <polyline points="22,6 12,13 2,6"></polyline>
      </svg>
    );

    const DollarSign = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="12" y1="1" x2="12" y2="23"></line>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
    );

    function HOAUtilitySplitter() {
      const [charges, setCharges] = useState(null);
      const [history, setHistory] = useState([]);
      const [anomalies, setAnomalies] = useState([]);
      const [emailDraft, setEmailDraft] = useState('');
      const [loading, setLoading] = useState(false);
      const [pdfjs, setPdfjs] = useState(null);

      useEffect(() => {
        // PDF.js is already loaded, just configure it
        if (window.pdfjsLib) {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          setPdfjs(window.pdfjsLib);
        }
      }, []);

      const parseAmount = (text) => {
        const match = text.match(/\$?(\d+\.?\d*)/);
        return match ? parseFloat(match[1]) : 0;
      };

      const extractChargesFromText = (text) => {
        const lines = text.split('\n');
        let water = 0, sewer = 0, solidWaste = 0, total = 0;
        let billDate = '';
        let dueDate = '';

        const dateMatch = text.match(/Statement date:\s*(\w+\s+\d+,\s+\d+)/);
        if (dateMatch) billDate = dateMatch[1];

        const dueDateMatch = text.match(/DUE DATE:\s*(\w+\s+\d+,\s+\d+)/i) ||
                            text.match(/due date:\s*(\w+\s+\d+,\s+\d+)/i);
        if (dueDateMatch) {
          dueDate = dueDateMatch[1];
        }

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          
          if (line.includes('Current Water Service')) {
            water = parseAmount(line);
            if (water === 0 && i + 1 < lines.length) {
              water = parseAmount(lines[i + 1]);
            }
          }
          
          if (line.includes('Current Sewer Service')) {
            sewer = parseAmount(line);
            if (sewer === 0 && i + 1 < lines.length) {
              sewer = parseAmount(lines[i + 1]);
            }
          }
          
          if (line.includes('Current Solid Waste Service')) {
            solidWaste = parseAmount(line);
            if (solidWaste === 0 && i + 1 < lines.length) {
              solidWaste = parseAmount(lines[i + 1]);
            }
          }
          
          if ((line.includes('TOTAL AMOUNT DUE') || line.includes('CURRENT BILLING')) && !line.includes('October')) {
            const amount = parseAmount(line);
            if (amount > 0 && amount > 100) {
              total = amount;
            }
          }
        }

        if (total === 0 && (water > 0 || sewer > 0 || solidWaste > 0)) {
          total = water + sewer + solidWaste;
        }

        return { water, sewer, solidWaste, total, billDate, dueDate };
      };

      const detectAnomalies = (current, history) => {
        const anomalies = [];
        
        if (history.length > 0) {
          const avgWater = history.reduce((sum, h) => sum + h.water, 0) / history.length;
          const avgSewer = history.reduce((sum, h) => sum + h.sewer, 0) / history.length;
          const avgSolidWaste = history.reduce((sum, h) => sum + h.solidWaste, 0) / history.length;
          
          const waterDiff = ((current.water - avgWater) / avgWater) * 100;
          const sewerDiff = ((current.sewer - avgSewer) / avgSewer) * 100;
          const solidWasteDiff = ((current.solidWaste - avgSolidWaste) / avgSolidWaste) * 100;
          
          if (Math.abs(waterDiff) > 30) {
            anomalies.push({
              type: 'Water',
              message: `Water charge is ${waterDiff > 0 ? 'higher' : 'lower'} than average by ${Math.abs(waterDiff).toFixed(1)}%`,
              severity: Math.abs(waterDiff) > 50 ? 'high' : 'medium'
            });
          }
          
          if (Math.abs(sewerDiff) > 30) {
            anomalies.push({
              type: 'Sewer',
              message: `Sewer charge is ${sewerDiff > 0 ? 'higher' : 'lower'} than average by ${Math.abs(sewerDiff).toFixed(1)}%`,
              severity: Math.abs(sewerDiff) > 50 ? 'high' : 'medium'
            });
          }
          
          if (Math.abs(solidWasteDiff) > 20) {
            anomalies.push({
              type: 'Solid Waste',
              message: `Solid waste charge is ${solidWasteDiff > 0 ? 'higher' : 'lower'} than average by ${Math.abs(solidWasteDiff).toFixed(1)}%`,
              severity: Math.abs(solidWasteDiff) > 20 ? 'high' : 'medium'
            });
          }
        }
        
        if (current.water === 0) anomalies.push({ type: 'Water', message: 'Water charge is $0 or missing', severity: 'high' });
        if (current.sewer === 0) anomalies.push({ type: 'Sewer', message: 'Sewer charge is $0 or missing', severity: 'high' });
        if (current.solidWaste === 0) anomalies.push({ type: 'Solid Waste', message: 'Solid waste charge is $0 or missing', severity: 'high' });
        
        const calculatedTotal = current.water + current.sewer + current.solidWaste;
        if (Math.abs(calculatedTotal - current.total) > 0.50) {
          anomalies.push({
            type: 'Total',
            message: `Total ($${current.total.toFixed(2)}) doesn't match sum of charges ($${calculatedTotal.toFixed(2)})`,
            severity: 'medium'
          });
        }
        
        return anomalies;
      };

      const generateEmail = (charges) => {
        const waterPerHousehold = [
          charges.water * 0.50,
          charges.water * 0.25,
          charges.water * 0.25
        ];
        
        const sewerPerHousehold = [
          charges.sewer * 0.50,
          charges.sewer * 0.25,
          charges.sewer * 0.25
        ];
        
        const solidWastePerHousehold = charges.solidWaste / 3;
        
        const totals = waterPerHousehold.map((w, i) => 
          w + sewerPerHousehold[i] + solidWastePerHousehold
        );

        let dueDateText = '[Due date]';
        if (charges.dueDate) {
          const date = new Date(charges.dueDate);
          const day = date.getDate();
          const month = date.toLocaleString('en-US', { month: 'long' });
          dueDateText = `${month} ${day}${getDaySuffix(day)}`;
        }

        return `Subject: SPU Bill for ${charges.billDate ? new Date(charges.billDate).toLocaleString('en-US', { month: 'long' }) : '[Month]'}

Good evening,

I received another SPU bill (attached). With the 50/25/25 split on water and sewer, and equal division on trash, here is my math:

Unit A (2313): $${totals[0].toFixed(2)}
Unit B (2313B): $${totals[1].toFixed(2)}
Unit C (2315): $${totals[2].toFixed(2)}

If everyone agrees, you can pay the bill for your portion through the online portal. ${dueDateText} is the due date.

Thanks,
[Your name]`;
      };

      const getDaySuffix = (day) => {
        if (day >= 11 && day <= 13) return 'th';
        switch (day % 10) {
          case 1: return 'st';
          case 2: return 'nd';
          case 3: return 'rd';
          default: return 'th';
        }
      };

      const extractTextFromPDF = async (file) => {
        if (!pdfjs) {
          throw new Error('PDF.js library not loaded yet. Please try again.');
        }

        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjs.getDocument({ data: arrayBuffer }).promise;
        let fullText = '';

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          
          const items = textContent.items.sort((a, b) => {
            if (Math.abs(a.transform[5] - b.transform[5]) > 5) {
              return b.transform[5] - a.transform[5];
            }
            return a.transform[4] - b.transform[4];
          });
          
          let lastY = null;
          let lineText = '';
          
          items.forEach(item => {
            const y = item.transform[5];
            
            if (lastY !== null && Math.abs(y - lastY) > 5) {
              fullText += lineText + '\n';
              lineText = '';
            }
            
            lineText += item.str + ' ';
            lastY = y;
          });
          
          if (lineText) {
            fullText += lineText + '\n';
          }
        }

        return fullText;
      };

      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setLoading(true);
        try {
          let text = '';
          
          if (file.name.toLowerCase().endsWith('.pdf')) {
            text = await extractTextFromPDF(file);
            console.log('Extracted PDF text:', text.substring(0, 1000));
          } else if (file.name.toLowerCase().endsWith('.txt')) {
            text = await file.text();
          } else {
            alert('Please upload a PDF or TXT file');
            setLoading(false);
            return;
          }
          
          processText(text);
        } catch (error) {
          console.error('Error reading file:', error);
          alert(`Error reading file: ${error.message}. Please check the console for details.`);
        } finally {
          setLoading(false);
        }
      };

      const processText = (text) => {
        const extracted = extractChargesFromText(text);
        const detectedAnomalies = detectAnomalies(extracted, history);
        const email = generateEmail(extracted);
        
        setCharges(extracted);
        setAnomalies(detectedAnomalies);
        setEmailDraft(email);
        
        if (extracted.water > 0 || extracted.sewer > 0 || extracted.solidWaste > 0) {
          setHistory(prev => [...prev, extracted].slice(-6));
        }
      };

      const copyToClipboard = () => {
        navigator.clipboard.writeText(emailDraft);
        alert('Email draft copied to clipboard!');
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
          <div className="max-w-5xl mx-auto">
            <div className="bg-white rounded-xl shadow-lg p-8 mb-6">
              <div className="flex items-center gap-3 mb-6">
                <DollarSign className="w-8 h-8 text-indigo-600" />
                <h1 className="text-3xl font-bold text-gray-800">HOA Utility Bill Splitter</h1>
              </div>
              
              <p className="text-gray-600 mb-6">
                Upload your Seattle Public Utilities bill (PDF or TXT) to automatically split charges among the three households.
              </p>

              <div className="border-2 border-dashed border-indigo-300 rounded-lg p-8 text-center bg-indigo-50 hover:bg-indigo-100 transition-colors">
                <input
                  type="file"
                  id="file-upload"
                  accept=".pdf,.txt"
                  onChange={handleFileUpload}
                  className="hidden"
                />
                <label htmlFor="file-upload" className="cursor-pointer">
                  <Upload className="w-12 h-12 mx-auto mb-4 text-indigo-600" />
                  <p className="text-lg font-medium text-gray-700 mb-2">
                    {loading ? 'Processing...' : 'Click to upload bill (PDF or TXT)'}
                  </p>
                  <p className="text-sm text-gray-500">
                    Your bill will be analyzed and split automatically
                  </p>
                </label>
              </div>
            </div>

            {anomalies.length > 0 && (
              <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                <div className="flex items-center gap-2 mb-4">
                  <AlertCircle className="w-6 h-6 text-orange-600" />
                  <h2 className="text-xl font-bold text-gray-800">Anomalies Detected</h2>
                </div>
                <div className="space-y-3">
                  {anomalies.map((anomaly, idx) => (
                    <div
                      key={idx}
                      className={`p-4 rounded-lg border-l-4 ${
                        anomaly.severity === 'high'
                          ? 'bg-red-50 border-red-500'
                          : 'bg-yellow-50 border-yellow-500'
                      }`}
                    >
                      <div className="flex items-start gap-3">
                        <AlertCircle className={`w-5 h-5 mt-0.5 ${
                          anomaly.severity === 'high' ? 'text-red-600' : 'text-yellow-600'
                        }`} />
                        <div>
                          <p className="font-semibold text-gray-800">{anomaly.type}</p>
                          <p className="text-gray-700">{anomaly.message}</p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {charges && (
              <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                <h2 className="text-xl font-bold text-gray-800 mb-4">Charges Breakdown</h2>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                  <div className="bg-blue-50 p-4 rounded-lg">
                    <p className="text-sm text-gray-600 mb-1">Water</p>
                    <p className="text-2xl font-bold text-blue-600">${charges.water.toFixed(2)}</p>
                  </div>
                  <div className="bg-green-50 p-4 rounded-lg">
                    <p className="text-sm text-gray-600 mb-1">Sewer</p>
                    <p className="text-2xl font-bold text-green-600">${charges.sewer.toFixed(2)}</p>
                  </div>
                  <div className="bg-purple-50 p-4 rounded-lg">
                    <p className="text-sm text-gray-600 mb-1">Solid Waste</p>
                    <p className="text-2xl font-bold text-purple-600">${charges.solidWaste.toFixed(2)}</p>
                  </div>
                  <div className="bg-indigo-50 p-4 rounded-lg">
                    <p className="text-sm text-gray-600 mb-1">Total</p>
                    <p className="text-2xl font-bold text-indigo-600">${charges.total.toFixed(2)}</p>
                  </div>
                </div>
              </div>
            )}

            {emailDraft && (
              <div className="bg-white rounded-xl shadow-lg p-6">
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-2">
                    <Mail className="w-6 h-6 text-indigo-600" />
                    <h2 className="text-xl font-bold text-gray-800">Email Draft</h2>
                  </div>
                  <button
                    onClick={copyToClipboard}
                    className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors font-medium"
                  >
                    Copy to Clipboard
                  </button>
                </div>
                <pre className="bg-gray-50 p-4 rounded-lg text-sm overflow-x-auto whitespace-pre-wrap font-mono text-gray-800 border border-gray-200">
                  {emailDraft}
                </pre>
              </div>
            )}

            {history.length > 0 && (
              <div className="bg-white rounded-xl shadow-lg p-6 mt-6">
                <h2 className="text-xl font-bold text-gray-800 mb-4">Bill History ({history.length} bills)</h2>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="border-b-2 border-gray-200">
                        <th className="text-left py-2 px-3 font-semibold text-gray-700">Date</th>
                        <th className="text-right py-2 px-3 font-semibold text-gray-700">Water</th>
                        <th className="text-right py-2 px-3 font-semibold text-gray-700">Sewer</th>
                        <th className="text-right py-2 px-3 font-semibold text-gray-700">Trash</th>
                        <th className="text-right py-2 px-3 font-semibold text-gray-700">Total</th>
                      </tr>
                    </thead>
                    <tbody>
                      {history.map((bill, idx) => (
                        <tr key={idx} className="border-b border-gray-100">
                          <td className="py-2 px-3 text-gray-700">{bill.billDate || 'Unknown'}</td>
                          <td className="text-right py-2 px-3 text-gray-700">${bill.water.toFixed(2)}</td>
                          <td className="text-right py-2 px-3 text-gray-700">${bill.sewer.toFixed(2)}</td>
                          <td className="text-right py-2 px-3 text-gray-700">${bill.solidWaste.toFixed(2)}</td>
                          <td className="text-right py-2 px-3 font-semibold text-gray-800">${bill.total.toFixed(2)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HOAUtilitySplitter />);
  </script>
</body>
</html>
